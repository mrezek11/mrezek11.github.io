<!DOCTYPE html>
<html>
 
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
</head>
 
<body>
    <h1>
        <strong>
            <a href="https://www.linkedin.com/in/matthew-rezek-36609938a?utm_source=share_via&utm_content=profile&utm_medium=member_ios%22>Ai Chatbot</a>
        </strong>
    </h1>
 
    <hr>
 
    <div id="screen"></div>
 
    <div class="search">
        <input type="text" id="inputBox" placeholder="Enter Prompt">
        <button onclick="sendMessage()">Enter</button>
    </div>
 
    <div class="token">
        <input type="text" id="tokenInput" placeholder="Enter your Github PAT">
        <br />
        <i>Please enter your token in the box above, ensure it has the Models scope as part of the token</i>
        <br />
        <i>Note, this app does not store your token, it simply makes API requests to demonstrate knowledge</i>
    </div>
    <script src="scripts.js"></script>
</body>
 
 
</html>
 
<style>
    body {
    display: flex;
    flex-direction: column;
    align-items: center;
}
 
 
 
 
 
 
h1 {
 
    font-family: Arial, sans-serif;
    cursor: pointer;
    margin-LEFT: 30px;
    margin-top: 10px;
 
}
 
#screen {
    font-family: Arial, sans-serif;
    text-align: left;
    width: 90%;
    height: 500px;
    font-size: 24px;
    padding: 20px;
    border: 2px solid black;
    border-radius: 50px;
    margin-bottom: 10px;
    margin: 0 auto 10px auto;
    overflow-y: auto;
    white-space: normal;
    word-wrap: break-word;
}
 
input {
    width: 800px;
    padding: 10px;
    font-size: 18px;
    border: 2px solid black;
    border-radius: 10px;
}
 
.search {
    display: flex;
    align-items: center;
    gap: 10px;
}
 
.search button {
    padding: 10px 20px;
    background-color: blue;
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}
 
a {
    color: inherit;
    text-decoration: none;
    cursor: text;
}
 
a:visited,
a:hover,
a:active {
    color: inherit;
    text-decoration: none;
}
</style>
 
<script>
    var input = document.getElementById("inputBox");
 
input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
    event.preventDefault();
    enter();
 
 
  }
});
 
function sendMessage() {
    let input = document.getElementById("inputBox");
    let screen = document.getElementById("screen");
    //this gets the input
    let userText = input.value;
 
 
    if (userText === "") return;
   
    const pat = document.getElementById("tokenInput");
 
    if(!pat.value){
        alert("Please enter a token in the box")
        return;
    }
 
 
    let userMsg = document.createElement("div");
    userMsg.classList.add("message");
    userMsg.innerText = "You: " + userText;
 
    screen.appendChild(userMsg);
 
 
 
    fetch("https://models.github.ai/inference/chat/completions", {
        headers: {
            "Authorization": "Bearer " + pat.value,
            "Content-Type": "application/json",
        },
        method: "POST",
        body: JSON.stringify({
        "messages": [
            {
                "role": "assistant",
                "content": "You are an ai assistant. Your role is to return concise responses simply without extra bloat in messages."
            },
            {
                "role": "user",
                "content": userText
            }
        ],
        "temperature": 0,
        "top_p": 1.0,
        "max_tokens": 1000,
        "model": "openai/gpt-4.1-nano"
    })
}).then((response) => {
    if(!response.ok){
        response.text().then((text) =>{
            alert("The request failed. Please try again or check your token valid. API Error: " + text)
        })
    }
 
    response.json().then((jsonResponse) => {
        const messageResponse = jsonResponse.choices[0].message.content;
        console.log("The response from the AI is : ", messageResponse);
        let botMsg = document.createElement("div");
        botMsg.classList.add("message");
        botMsg.innerText = "Bot:" + messageResponse;
 
         screen.appendChild(botMsg);
 
 
        input.value = "";
        screen.scrollTop = screen.scrollHeight;
 
    })
})
.catch((error) => {
    console.log(error);
})
 
}
 
</script>
