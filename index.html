<!DOCTYPE html>
<html lang="en">
 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
 
<style>
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
}
 
h1 {
    margin-left: 30px;
    margin-top: 10px;
}
 
#screen {
    width: 90%;
    max-width: 900px;
    height: 500px;
    font-size: 18px;
    padding: 20px;
    border: 2px solid black;
    border-radius: 20px;
    margin: 0 auto 10px auto;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-sizing: border-box;
}
 
.message {
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 80%;
    word-wrap: break-word;
}
 
.user {
    background: #d6e4ff;
    align-self: flex-end;
}
 
.bot {
    background: #e9e9e9;
    align-self: flex-start;
}
 
.loading {
    opacity: 0.7;
    font-style: italic;
}
 
input {
    width: min(800px, 90vw);
    padding: 10px;
    font-size: 18px;
    border: 2px solid black;
    border-radius: 10px;
    box-sizing: border-box;
}
 
.search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}
 
.search button {
    padding: 10px 20px;
    background: blue;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}
 
.token {
    text-align: center;
}
 
a,
a:visited,
a:hover,
a:active {
    color: inherit;
    text-decoration: none;
}
</style>
 
</head>
 
<body>
 
<h1>
<strong>
<a href="https://www.linkedin.com/in/matthew-rezek-36609938a" target="_blank">
🤖 AI Chatbot
</a>
</strong>
</h1>
 
<hr style="width:90%;">
 
<div id="screen"></div>
 
<div class="search">
    <input type="text" id="inputBox" placeholder="Enter Prompt">
    <button onclick="sendMessage()">Enter</button>
</div>
 
<div class="token">
    <input type="password" id="tokenInput" placeholder="Enter your GitHub PAT">
    <br><br>
    <i>Please enter your github token. Ensure it has the Models scope.</i>
    <br>
    <i>This app does not store your token.</i>
</div>
 
<script>
const input = document.getElementById("inputBox");
 
input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});
 
async function sendMessage() {
 
    const input = document.getElementById("inputBox");
    const screen = document.getElementById("screen");
    const pat = document.getElementById("tokenInput");
 
    const userText = input.value.trim();
 
    if (!userText) return;
 
    if (!pat.value) {
        alert("Please enter a token.");
        return;
    }
 
    // 👤 USER MESSAGE
    const userMsg = document.createElement("div");
    userMsg.classList.add("message", "user");
    userMsg.innerText = "You: " + userText;
    screen.appendChild(userMsg);
 
    input.value = "";
 
    // 🤖 LOADING MESSAGE
    const loading = document.createElement("div");
    loading.classList.add("message", "bot", "loading");
    loading.innerText = "🤖 Bot is thinking...";
    loading.id = "loading";
    screen.appendChild(loading);
 
    screen.scrollTop = screen.scrollHeight;
 
    try {
        const response = await fetch(
            "https://models.github.ai/inference/chat/completions",
            {
                method: "POST",
                headers: {
                    Authorization: "Bearer " + pat.value,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    messages: [
                        {
                            role: "system",
                            content: "You are an AI assistant. Return concise responses."
                        },
                        {
                            role: "user",
                            content: userText
                        }
                    ],
                    temperature: 0,
                    top_p: 1,
                    max_tokens: 1000,
                    model: "openai/gpt-4.1-nano"
                })
            }
        );
 
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText);
        }
 
        const data = await response.json();
 
        // remove loading
        document.getElementById("loading")?.remove();
 
        const botMsg = document.createElement("div");
        botMsg.classList.add("message", "bot");
        botMsg.innerText = "🤖 " + data.choices[0].message.content;
 
        screen.appendChild(botMsg);
 
        screen.scrollTop = screen.scrollHeight;
 
    } catch (err) {
        document.getElementById("loading")?.remove();
        console.error(err);
        alert("Request failed: " + err.message);
    }
}
</script>
 
</body>
</html>
